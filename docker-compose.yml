# PT-Forward Docker Compose
# 使用方法：
#   1. mkdir -p data config logs（创建数据目录，owner 为当前用户）
#   2. docker compose up -d
# 非默认用户（UID≠1000）请在 .env 文件或环境变量中设置：
#   echo "UID=$(id -u)" > .env && echo "GID=$(id -g)" >> .env
# 更新方式：
#   方式 1（OTA 热更新）：前端侧栏 → 检查更新 → 立即更新（推荐，无需拉取镜像）
#   方式 2（镜像更新）：docker compose pull && docker compose up -d

services:
  pt-forward:
    image: ghcr.io/ranfish/pt-forward:latest
    container_name: pt-forward
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data        # SQLite 数据库（持久化）
      - ./config:/config    # 配置文件（持久化）
      - ./logs:/logs        # 系统日志（持久化）
    environment:
      - TZ=Asia/Shanghai    # 时区
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
