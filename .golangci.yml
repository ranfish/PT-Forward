version: "2"

linters:
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - encoding/json.Encoder.Encode
        - fmt.Sscanf
    gosec:
      excludes: []
    staticcheck:
      checks:
        - all
        - -QF1002
        - -QF1003
        - -ST1000
        - -ST1021
        - -ST1003
  exclusions:
    paths:
      - web/node_modules
      - frontend/dist
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
