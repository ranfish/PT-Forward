version: '3.8'

services:
  pt_transfer:
    build: .  # 告诉 Compose 每次构建时读取当前目录下的 Dockerfile
    image: pt_auto_transfer:latest
    container_name: pt_transfer
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      # 配置和状态文件使用相对路径 (因为 docker-compose.yml 就在这个目录下)
      - ./config.yaml:/app/config.yaml
      - ./transfer_state.json:/app/transfer_state.json
      # 物理视频文件的挂载保持绝对路径
      - /root/ardtu/pt:/app/data