name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc -b --noEmit

      - name: Lint
        run: npx eslint src/

      - name: Test
        run: npx vitest run

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html

      - name: Download Go modules
        run: go mod download

      - name: Vet
        run: go vet ./internal/... ./cmd/pt-forward/...

      - name: Test
        run: CGO_ENABLED=1 go test -count=1 -timeout 180s ./internal/...

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Lint
        run: golangci-lint run ./internal/...

  build:
    runs-on: ubuntu-latest
    needs: [frontend, test, lint]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build
        run: CGO_ENABLED=1 go build -ldflags "-s -w" ./cmd/pt-forward/
