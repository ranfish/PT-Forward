name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install CGO dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          rm -rf ../frontend/dist
          cp -r dist ../frontend/dist

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF_NAME}
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION}" -o pt-forward-linux-amd64 ./cmd/pt-forward/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: pt-forward-linux-amd64
          generate_release_notes: true
