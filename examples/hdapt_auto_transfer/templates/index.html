<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT 自动转发控制面板</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #111827;
            --card: #1f2937;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --input: #374151;
            --accent: #10b981;
        }
        body {
            font-family: "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            background: var(--card);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        h1 {
            margin: 0;
            color: var(--primary);
            font-size: 28px;
        }
        a {
            color: var(--text);
            text-decoration: none;
        }
        .logout {
            padding: 10px 14px;
            border-radius: 10px;
            background: #4b5563;
        }
        .section {
            margin-top: 28px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 13px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--input);
            border: 1px solid #4b5563;
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 96px;
            resize: vertical;
        }
        .url-area {
            min-height: 120px;
            font-family: Consolas, monospace;
        }
        .hint {
            margin-top: 6px;
            color: #6b7280;
            font-size: 12px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }
        .checkbox-row input {
            width: auto;
        }
        .flash {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
        }
        button {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>PT 自动转发管理面板</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <form action="/clear_cache" method="POST" style="margin: 0;" onsubmit="return confirm('警告：确认要清空所有缓存记录吗？之前已处理或已被删除的种子可能会被重新抓取和处理！');">
                    <button type="submit" style="margin: 0; padding: 10px 14px; border-radius: 10px; background: #dc2626; color: white; font-size: 14px; width: auto; font-weight: normal; cursor: pointer; border: none;">清除缓存</button>
                </form>
                <a class="logout" href="/logout">退出登录</a>
            </div>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/save" method="POST">
            <div class="section">
                <div class="section-title">Web UI</div>
                <label>Web UI 登录密码</label>
                <input type="password" name="web_ui_password" value="{{ config.get('web_ui', {}).get('password', '') }}">
                <div class="hint">留空表示不启用密码保护。</div>
            </div>

            <div class="section">
                <div class="section-title">TTG 配置</div>
                <label>待抓取的 TTG 页面链接，每行一个 (支持任意详情列表、特定搜索页，以及小货车 RSS 订阅链接等)</label>
                <textarea name="monitor_urls" class="url-area">{{ monitor_urls_str }}</textarea>

                <label style="margin-top:16px;">TTG 登录 Cookie</label>
                <textarea name="ttg_cookie">{{ config['sites']['ttg']['cookie'] }}</textarea>
            </div>

            <div class="section">
                <div class="section-title">M-Team 配置</div>
                <label>待抓取的 M-Team 列表页面链接，每行一个</label>
                <textarea name="mt_monitor_urls" class="url-area">{{ mt_monitor_urls_str }}</textarea>

                <label style="margin-top:16px;">M-Team API Key</label>
                <input type="text" name="mt_api_key" value="{{ config['sites']['mteam']['api_key'] if 'mteam' in config['sites'] else '' }}">

                <div class="checkbox-row">
                    <input type="checkbox" name="mt_free_only" id="mt_free_only" {{ 'checked' if config['sites'].get('mteam', {}).get('free_only', True) else '' }}>
                    <label for="mt_free_only" style="margin-bottom:0;">仅抓取 FREE 种子</label>
                </div>
            </div>

            <div class="section">
                <div class="section-title">元数据与 HDArea</div>
                <label>豆瓣简介 API</label>
                <input type="text" name="meta_api_url" value="{{ config['metadata_api']['imdb_to_douban'] }}">
                <div class="hint">请保留 URL 中的 <code>{imdb_id}</code> 占位符。</div>

                <label style="margin-top:16px;">HDArea 登录 Cookie</label>
                <textarea name="hda_cookie">{{ config['sites']['hdarea']['cookie'] }}</textarea>
            </div>

            <div class="section">
                <div class="section-title">qBittorrent</div>
                <div class="grid">
                    <div>
                        <label>QB 地址</label>
                        <input type="text" name="qb_host" value="{{ config['qbittorrent']['host'] }}">
                    </div>
                    <div>
                        <label>QB 用户名</label>
                        <input type="text" name="qb_username" value="{{ config['qbittorrent']['username'] }}">
                    </div>
                    <div>
                        <label>QB 密码</label>
                        <input type="password" name="qb_password" value="{{ config['qbittorrent']['password'] }}">
                    </div>
                    <div>
                        <label>QB 保存路径</label>
                        <input type="text" name="qb_path" value="{{ config['qbittorrent']['save_path'] }}">
                    </div>
                    <div>
                        <label>全局上传限速 (MB/s)</label>
                        <input type="number" name="qb_global_speed" value="{{ config['qbittorrent'].get('max_global_upload_speed_mb', 90) }}">
                    </div>
                    <div>
                        <label>单种上传限速 (MB/s)</label>
                        <input type="number" name="qb_torrent_speed" value="{{ config['qbittorrent']['max_torrent_upload_speed_mb'] }}">
                    </div>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" name="qb_super_seeding" id="qb_super_seeding" {{ 'checked' if config['qbittorrent'].get('use_super_seeding', True) else '' }}>
                    <label for="qb_super_seeding" style="margin-bottom:0;">开启 Super Seeding</label>
                </div>
            </div>

            <div class="section">
                <div class="section-title">自动化策略</div>
                <div class="grid">
                    <div>
                        <label>最大同时下载任务</label>
                        <input type="number" name="max_dl" value="{{ config['concurrency']['max_active_downloads'] }}">
                    </div>
                    <div>
                        <label>最大活跃做种数</label>
                        <input type="number" name="max_up" value="{{ config['concurrency']['max_active_uploads'] }}">
                    </div>
                    <div>
                        <label>最长做种时间 (小时)</label>
                        <input type="number" name="max_seed_time" value="{{ config['cleanup_rules']['max_seed_time_hours'] }}">
                    </div>
                    <div>
                        <label>触发删种的做种人数</label>
                        <input type="number" name="min_seeders" value="{{ config['cleanup_rules']['min_seeders_for_deletion'] }}">
                    </div>
                    <div style="grid-column: span 2;">
                        <label style="color: #fbbf24;">⚠️ 联合淘汰条件 (需同时满足以下两者)</label>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <span style="font-size: 13px;">分享率达到</span>
                            <input type="number" step="0.1" name="min_ratio" value="{{ config['cleanup_rules'].get('min_ratio_for_deletion', 1.1) }}" style="width: 80px;">
                            <span style="font-size: 13px;">且 平均速度不足 (KB/s / 分钟)</span>
                            <input type="text" name="low_speed_combo" value="{{ config['cleanup_rules'].get('low_speed_threshold_kb', 20) }}/{{ config['cleanup_rules'].get('low_speed_time_minutes', 10) }}" style="width: 120px;" placeholder="20/10">
                        </div>
                    </div>
                    <div>
                        <label>只抓取最近 X 小时资源</label>
                        <input type="number" name="max_ttl" value="{{ config['settings']['max_ttl_hours'] }}">
                    </div>
                    <div>
                        <label>检查间隔 (秒)</label>
                        <input type="number" name="check_interval" value="{{ config['settings']['check_interval'] }}">
                    </div>
                    <div>
                        <label>最小剩余空间 (GB)</label>
                        <input type="number" name="min_free_space" value="{{ config['settings'].get('min_free_space_gb', 30) }}">
                    </div>
                    <div>
                        <label>单个种子最大体积 (GB)</label>
                        <input type="number" step="0.1" name="max_size" value="{{ config['settings'].get('max_torrent_size_gb', 0) }}">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">路径映射</div>
                <div class="grid">
                    <div>
                        <label>远端路径</label>
                        <input type="text" name="remote_path" value="{{ config['settings'].get('path_mapping', {}).keys()|list|first if config['settings'].get('path_mapping') else '/downloads/disk1' }}">
                    </div>
                    <div>
                        <label>本地路径</label>
                        <input type="text" name="local_path" value="{{ config['settings'].get('path_mapping', {}).values()|list|first if config['settings'].get('path_mapping') else '/app/data' }}">
                    </div>
                </div>
            </div>

            <button type="submit">保存配置</button>
        </form>

        <div class="section" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #374151;">
            <div class="section-title">系统实时日志</div>
            <textarea id="app_logs" class="url-area" readonly style="font-size: 13px; font-family: Consolas, monospace; background: #000; color: #4ade80; min-height: 400px;"></textarea>
        </div>
    </div>
    
    <script>
        const logArea = document.getElementById('app_logs');
        let autoScroll = true;

        logArea.addEventListener('scroll', () => {
            // 如果用户向上滚动，取消自动滚动
            if (logArea.scrollHeight - logArea.scrollTop > logArea.clientHeight + 20) {
                autoScroll = false;
            } else {
                autoScroll = true;
            }
        });

        function fetchLogs() {
            fetch('/api/logs')
                .then(res => res.json())
                .then(data => {
                    logArea.value = data.logs;
                    if (autoScroll) {
                        logArea.scrollTop = logArea.scrollHeight;
                    }
                })
                .catch(err => console.error('获取日志失败:', err));
        }

        // 初始拉取并设置轮询，每2秒更新一次
        fetchLogs();
        setInterval(fetchLogs, 2000);
    </script>
</body>
</html>
