metadata_api:
  imdb_to_douban: https://doubaninfo.com/api/v1_douban.php?key=your_api_key_here&format&douban&url={imdb_id}
qbittorrent:
  host: http://192.168.1.100:8080/
  max_global_upload_speed_mb: 200.0
  max_torrent_upload_speed_mb: 80.0
  use_super_seeding: true
  password: 'your_qb_password'
  save_path: /downloads/disk1
  username: admin
settings:
  check_interval: 120
  max_torrent_size_gb: 200.0
  max_ttl_hours: 3
  min_free_space_gb: 30
  path_mapping:
    /downloads/disk1: /app/data
  temp_dir: /app/data/.pt_transfer
sites:
  hdarea:
    cookie: your_hdarea_cookie_here
    url: https://hdarea.club
  mteam:
    api_key: your_mteam_api_key_here
    free_only: false
    monitor_categories:
    - '419'
    monitor_urls:
    - https://kp.m-team.cc/browse?team=44&team=9&team=43
    url: https://api.m-team.cc
  ttg:
    cookie: your_ttg_cookie_here
    monitor_urls:
    - https://totheglory.im/browse.php?c=M&search_field=team%3A%22WiKi%22
    - https://totheglory.im/browse.php?c=M&search_field=team%3A%22NGB%22
    - https://totheglory.im/browse.php?c=M&search_field=team%3A%22ARiN%22
    url: https://totheglory.im
web_ui:
  password: 'your_web_ui_password'
